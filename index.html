<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Pet Express | Fast Village Delivery</title>
    
    <style>
        :root {
            --primary-orange: #FF8C00;
            --whatsapp-green: #25D366;
            --call-blue: #007AFF;
            --bg-color: #f8f9fa;
        }

        /* Cinematic Slow-Motion Entry for the Card */
        @keyframes slowMotionEntry {
            0% { 
                opacity: 0; 
                transform: translate3d(0, 40px, 0) scale(0.95);
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: translate3d(0, 0, 0) scale(1);
                filter: blur(0);
            }
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0; 
            padding: 15px;
        }

        .card { 
            background: white; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            padding-bottom: 30px;
            overflow: hidden;
            animation: slowMotionEntry 1.5s cubic-bezier(0.22, 1, 0.36, 1) both;
            will-change: transform, opacity, filter;
        }

        .logo-header {
            background: #000;
            padding: 25px 0;
            margin-bottom: 10px;
        }

        .logo { width: 140px; height: auto; display: block; margin: 0 auto; }

        h1 { color: #333; margin: 15px 0 5px 0; font-size: 28px; font-weight: 800; }

        .services {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .pill {
            background: #fff3e6;
            color: #d35400;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #ffdbb8;
        }

        .description { 
            color: #555; font-size: 15px; line-height: 1.6; 
            margin-bottom: 20px; padding: 0 30px;
        }

        .info-grid {
            background: #fafafa;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            margin-bottom: 25px;
        }

        .btn-container { padding: 0 30px; }

        /* --- BUBBLE MOTION BUTTONS --- */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px;
            margin-bottom: 12px;
            /* Transition for the 'Bubble' feel */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            cursor: pointer;
        }

        .btn-wa { 
            background: var(--whatsapp-green); 
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.2); 
        }
        
        .btn-call { 
            background: var(--call-blue); 
            font-size: 16px; 
            padding: 12px; 
        }

        /* Hover Effect: The Bubble Pop */
        .btn:hover { 
            transform: scale(1.1); /* Expands like a bubble */
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Active Effect: The Bubble Squeeze */
        .btn:active { 
            transform: scale(0.9); 
        }

        .upi-box { 
            margin: 20px 30px 0 30px; 
            padding: 15px; 
            background: #f8f9fa; 
            border: 1.5px dashed #ccc;
            border-radius: 12px; 
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .upi-box:hover { background: #f0f2f5; }

        .copy-hint { 
            font-size: 11px; 
            color: var(--primary-orange); 
            display: none; 
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-header">
            <img src="image_1250f4.jpeg" alt="C-Pet Express Logo" class="logo">
        </div>
        
        <h1>C-Pet Express</h1>
        <p style="color:var(--primary-orange); font-weight:bold; margin-bottom:15px; font-size: 13px; letter-spacing: 2px;">FAST VILLAGE DELIVERY</p>

        <div class="services">
            <span class="pill">🍔 Food</span>
            <span class="pill">🛒 Groceries</span>
            <span class="pill">💊 Medicines</span>
            <span class="pill">📦 Parcels</span>
        </div>
        
        <p class="description">
            Bringing Chilakaluripet’s best to <b>Murikipudi, Ganapavaram, Pasumarru, & Boppudi</b>.
        </p>

        <div class="info-grid">
            <div>📍 RANGE <b style="display:block; color:#333; font-size: 16px;">15 KM</b></div>
            <div>⏱️ HOURS <b style="display:block; color:#333; font-size: 16px;">9 AM - 10 PM</b></div>
        </div>
        
        <div class="btn-container">
            <a href="https://wa.me/918978862206?text=Hi%20C-Pet%20Express!%20I'd%20like%20to%20order." class="btn btn-wa">
                Order on WhatsApp
            </a>
            <a href="tel:+918978862206" class="btn btn-call">
                📞 Call Us Directly
            </a>
        </div>
        
        <div class="upi-box" onclick="copyUPI()">
            Tap to copy UPI ID:
            <span id="upiText" style="display:block; font-weight:bold; font-size:16px; margin-top:4px;">7993557645-2@ybl</span>
            <span id="copyHint" class="copy-hint">COPIED SUCCESSFULLY!</span>
        </div>
    </div>

    <script>
        function copyUPI() {
            const upiId = document.getElementById("upiText").innerText;
            const hint = document.getElementById("copyHint");
            navigator.clipboard.writeText(upiId).then(() => {
                hint.style.display = "block";
                setTimeout(() => { hint.style.display = "none"; }, 2000);
            });
        }
    </script>

</body>
</html>
